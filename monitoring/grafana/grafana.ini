[server]
protocol = http
http_port = 3000
domain = localhost

[security]
admin_user = admin
admin_password = admin
disable_initial_admin_creation = false

[analytics]
reporting_enabled = false
check_for_updates = false

[auth]
disable_login_form = false

[auth.anonymous]
enabled = false

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/overview.json

[smtp]
enabled = false

[alerting]
enabled = true
evaluate_timeout = 30s
max_annotations_to_keep = 10000
